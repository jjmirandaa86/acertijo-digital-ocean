version: "3.8"

services:
 node:
  image: node:20
  container_name: node_app
  working_dir: /usr/src/app
  volumes:
   - ./app:/usr/src/app
   - node_modules:/usr/src/app/node_modules
  command: sh -c "npm install && npm run start"
  environment:
   DATABASE_URL: mysql://$MYSQL_USER:$MYSQL_PASSWORD@mysql:$MYSQL_PORT/$MYSQL_DATABASE
   MONGO_URL: mongodb://$MONGO_INITDB_ROOT_USERNAME:$MONGO_INITDB_ROOT_PASSWORD@mongodb:$MONGO_PORT
   PORT: ${NODE_PORT}
  ports:
   - "${NODE_PORT}:${NODE_PORT}"
  depends_on:
   - mysql
   - mongodb

volumes:
 node_modules:
